<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Scanner v1.2</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #222;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px 16px;
  position: relative;
  flex-shrink: 0;
}
.top-bar h1 { font-size: 18px; }
.top-bar .ver {
  position: absolute;
  right: 16px;
  color: #1976d2;
  font-size: 11px;
  font-weight: 600;
}

#reader {
  flex: 1;
  min-height: 0;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
#reader video { border-radius: 8px; }

#status {
  text-align: center;
  color: #888;
  font-size: 11px;
  padding: 3px;
  flex-shrink: 0;
}

.bar {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 6px 12px 10px;
  flex-shrink: 0;
}

.result-pill {
  flex: 1;
  min-width: 0;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 8px 12px;
  display: none;
  align-items: center;
  gap: 8px;
}
.result-pill.show { display: flex; }

.result-pill .label { font-size: 10px; color: #888; white-space: nowrap; }
.result-pill .value {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}
.result-pill .value a { color: #1976d2; text-decoration: none; }

.btns { display: flex; gap: 5px; flex-shrink: 0; }
.btn {
  padding: 7px 12px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
  white-space: nowrap;
}
.btn-scan { background: #1976d2; color: #fff; }
.btn-scan:hover { background: #1565c0; }
.btn-scan.running { background: #d32f2f; }
.btn-copy { background: #e0e0e0; color: #333; }
.btn-copy:hover { background: #d0d0d0; }
.btn-open { background: #e3f2fd; color: #1976d2; }
.btn-open:hover { background: #bbdefb; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>📷 QR Scanner</h1>
  <span class="ver">v1.2</span>
</div>

<div id="reader"></div>
<div id="status"></div>

<div class="bar">
  <div class="result-pill" id="resultPill">
    <span class="label">結果</span>
    <span class="value" id="resultValue"></span>
  </div>
  <div class="btns">
    <button class="btn btn-scan" id="scanBtn" onclick="toggleScan()">停止</button>
    <button class="btn btn-copy" id="copyBtn" onclick="copyResult()" style="display:none">複製</button>
    <button class="btn btn-open" id="openBtn" onclick="openResult()" style="display:none">開啟</button>
  </div>
</div>

<script>
const statusDiv = document.getElementById('status');
const scanBtn = document.getElementById('scanBtn');
const copyBtn = document.getElementById('copyBtn');
const openBtn = document.getElementById('openBtn');
const resultPill = document.getElementById('resultPill');
const resultValue = document.getElementById('resultValue');

let scanner = null;
let lastResult = '';
let scanning = false;

// Auto-start on load
window.addEventListener('load', () => {
  setTimeout(startScan, 300);
});

function toggleScan() {
  if (scanning) stopScan();
  else startScan();
}

function startScan() {
  statusDiv.textContent = '啟動中...';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 200, height: 200 } },
    onSuccess,
    () => {}
  ).then(() => {
    scanning = true;
    statusDiv.textContent = '掃描中';
    scanBtn.textContent = '停止';
    scanBtn.classList.add('running');
  }).catch(err => {
    statusDiv.textContent = '❌ ' + err;
  });
}

function stopScan() {
  if (scanner) {
    scanner.stop().then(() => {
      scanning = false;
      statusDiv.textContent = '已停止';
      scanBtn.textContent = '開始';
      scanBtn.classList.remove('running');
    }).catch(() => {});
  }
}

function onSuccess(text) {
  if (text === lastResult) return;
  lastResult = text;
  if (navigator.vibrate) navigator.vibrate(100);

  const isUrl = /^https?:\/\//i.test(text);
  resultPill.classList.add('show');
  copyBtn.style.display = '';

  if (isUrl) {
    resultValue.innerHTML = `<a href="${esc(text)}" target="_blank" rel="noopener">${esc(text)}</a>`;
    openBtn.style.display = '';
  } else {
    resultValue.textContent = text;
    openBtn.style.display = 'none';
  }
  statusDiv.textContent = '✅ 成功';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyResult() {
  navigator.clipboard.writeText(lastResult).then(() => {
    statusDiv.textContent = '✅ 已複製';
  });
}

function openResult() {
  if (lastResult) window.open(lastResult, '_blank');
}
</script>
</body>
</html>
