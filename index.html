<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QR Scanner v1.1</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #222;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

header {
  text-align: center;
  padding: 10px 16px 6px;
  flex-shrink: 0;
}
header h1 { font-size: 20px; color: #1a1a2e; }
header .version { color: #1976d2; font-size: 11px; font-weight: 600; }

#reader {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  border-radius: 10px;
  overflow: hidden;
  background: #000;
  flex-shrink: 0;
}
#reader video { border-radius: 10px; }

#status {
  text-align: center;
  color: #888;
  font-size: 12px;
  padding: 4px;
  flex-shrink: 0;
}

.controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 6px 16px;
  flex-shrink: 0;
}
.btn {
  padding: 8px 20px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
}
.btn-primary { background: #1976d2; color: #fff; }
.btn-primary:hover { background: #1565c0; }
.btn-danger { background: #d32f2f; color: #fff; }
.btn-secondary { background: #e0e0e0; color: #333; }
.btn:disabled { background: #ccc; color: #999; cursor: not-allowed; }

.result-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px 16px 16px;
  min-height: 0;
}

.result-card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 14px;
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.result-card.show { display: flex; }

.result-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

.result-text {
  flex: 1;
  overflow-y: auto;
  font-size: 15px;
  word-break: break-all;
  padding: 10px;
  background: #f8f9fa;
  border-radius: 6px;
  line-height: 1.5;
}
.result-text a { color: #1976d2; }

.result-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<header>
  <h1>📷 QR Scanner</h1>
  <div class="version">v1.1</div>
</header>

<div id="reader"></div>
<div id="status"></div>

<div class="controls">
  <button class="btn btn-primary" id="startBtn" onclick="startScan()">▶ 開始</button>
  <button class="btn btn-danger" id="stopBtn" onclick="stopScan()" disabled>⏹ 停止</button>
</div>

<div class="result-area">
  <div class="result-card" id="resultCard">
    <div class="result-label">掃描結果</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-actions">
      <button class="btn btn-secondary" onclick="copyResult()">📋 複製</button>
      <button class="btn btn-primary" id="openBtn" onclick="openResult()" style="display:none">🔗 開啟</button>
    </div>
  </div>
</div>

<script>
const statusDiv = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const resultText = document.getElementById('resultText');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const openBtn = document.getElementById('openBtn');

let scanner = null;
let lastResult = '';

function startScan() {
  statusDiv.textContent = '啟動中...';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onSuccess,
    () => {}
  ).then(() => {
    statusDiv.textContent = '掃描中';
    startBtn.disabled = true;
    stopBtn.disabled = false;
  }).catch(err => {
    statusDiv.textContent = '❌ ' + err;
  });
}

function stopScan() {
  if (scanner) {
    scanner.stop().then(() => {
      statusDiv.textContent = '已停止';
      startBtn.disabled = false;
      stopBtn.disabled = true;
    });
  }
}

function onSuccess(text) {
  if (text === lastResult) return;
  lastResult = text;
  if (navigator.vibrate) navigator.vibrate(100);

  resultCard.classList.add('show');
  const isUrl = /^https?:\/\//i.test(text);
  if (isUrl) {
    resultText.innerHTML = `<a href="${escHtml(text)}" target="_blank" rel="noopener">${escHtml(text)}</a>`;
    openBtn.style.display = '';
    openBtn.onclick = () => window.open(text, '_blank');
  } else {
    resultText.textContent = text;
    openBtn.style.display = 'none';
  }
  statusDiv.textContent = '✅ 成功';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyResult() {
  navigator.clipboard.writeText(lastResult).then(() => {
    statusDiv.textContent = '✅ 已複製';
  });
}
</script>
</body>
</html>
