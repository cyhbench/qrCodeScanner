<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #222;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px 16px;
  position: relative;
  flex-shrink: 0;
}
.top-bar h1 { font-size: 18px; }
.top-bar .ver {
  position: absolute; right: 16px;
  color: #1976d2; font-size: 11px; font-weight: 600;
}

.result-banner {
  flex-shrink: 0;
  padding: 0 12px;
  display: none;
}
.result-banner.show { display: block; }

.result-inner {
  background: #e8f5e9;
  border: 1px solid #a5d6a7;
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.result-inner .icon { font-size: 20px; flex-shrink: 0; }
.result-inner .text {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-inner .text a { color: #2e7d32; text-decoration: none; }

#reader {
  flex: 1;
  min-height: 0;
  max-width: 500px;
  width: 100%;
  margin: 4px auto;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
#reader video { border-radius: 8px; }

#status {
  text-align: center;
  color: #888;
  font-size: 11px;
  padding: 2px;
  flex-shrink: 0;
}

.bar {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 6px 12px 10px;
  flex-shrink: 0;
}
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
}
.btn-scan { background: #1976d2; color: #fff; }
.btn-scan:hover { background: #1565c0; }
.btn-scan.running { background: #d32f2f; }
.btn-copy { background: #e0e0e0; color: #333; }
.btn-copy:hover { background: #d0d0d0; }
.btn-open { background: #e3f2fd; color: #1976d2; }
.btn-open:hover { background: #bbdefb; }

@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #e0e0e0; }
  .result-inner { background: #1b3a1e; border-color: #2e7d32; }
  .result-inner .text a { color: #66bb6a; }
  #reader { background: #000; }
  .btn-copy { background: #444; color: #e0e0e0; }
  .btn-copy:hover { background: #555; }
  .btn-open { background: #1a2a3a; color: #42a5f5; }
  .btn-open:hover { background: #1e3a5a; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📷 QR Scanner</h1>
  <span class="ver">v1.4</span>
</div>

<div class="result-banner" id="resultBanner">
  <div class="result-inner">
    <span class="icon">✅</span>
    <span class="text" id="resultText"></span>
  </div>
</div>

<div id="reader"></div>
<div id="status"></div>

<div class="bar">
  <button class="btn btn-scan" id="scanBtn">停止</button>
  <button class="btn btn-copy" id="copyBtn" style="display:none">複製</button>
  <button class="btn btn-open" id="openBtn" style="display:none">開啟</button>
</div>

<script>
const statusDiv = document.getElementById('status');
const scanBtn = document.getElementById('scanBtn');
const copyBtn = document.getElementById('copyBtn');
const openBtn = document.getElementById('openBtn');
const resultBanner = document.getElementById('resultBanner');
const resultText = document.getElementById('resultText');

let scanner = null;
let lastResult = '';
let scanning = false;

window.addEventListener('load', () => { setTimeout(startScan, 300); });

function toggleScan() { scanning ? stopScan() : startScan(); }

function startScan() {
  statusDiv.textContent = '啟動中...';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 200, height: 200 } },
    onSuccess, () => {}
  ).then(() => {
    scanning = true;
    statusDiv.textContent = '掃描中';
    scanBtn.textContent = '停止';
    scanBtn.classList.add('running');
  }).catch(err => { statusDiv.textContent = '❌ ' + err; });
}

function stopScan() {
  if (scanner) scanner.stop().then(() => {
    scanning = false;
    statusDiv.textContent = '已停止';
    scanBtn.textContent = '開始';
    scanBtn.classList.remove('running');
  }).catch(() => {});
}

function onSuccess(text) {
  if (text === lastResult) return;
  lastResult = text;
  if (navigator.vibrate) navigator.vibrate(100);

  const isUrl = /^https?:\/\//i.test(text);
  resultBanner.classList.add('show');
  copyBtn.style.display = '';

  if (isUrl) {
    const a = document.createElement('a');
    a.href = text;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = text;
    resultText.textContent = '';
    resultText.appendChild(a);
    openBtn.style.display = '';
  } else {
    resultText.textContent = text;
    openBtn.style.display = 'none';
  }
  statusDiv.textContent = '✅ 成功';
}

function copyResult() {
  navigator.clipboard.writeText(lastResult).then(() => { statusDiv.textContent = '✅ 已複製'; });
}

function openResult() {
  if (lastResult) window.open(lastResult, '_blank', 'noopener,noreferrer');
}

scanBtn.addEventListener('click', toggleScan);
copyBtn.addEventListener('click', copyResult);
openBtn.addEventListener('click', openResult);
</script>
</body>
</html>
